<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary Meta Tags -->
    <title>Shansofts | Custom Software, Web & Mobile App Development</title>
    <meta
      name="description"
      content="Shansofts is an IT solutions company delivering custom software, web development, mobile apps, cloud, and AI solutions that scale your business."
    />
    <meta name="keywords" content="Shansofts, software development company, web development, mobile app development, MERN stack, IT solutions, custom software, SaaS" />
    <meta name="author" content="Shansofts" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.shansofts.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.shansofts.com/" />
    <meta property="og:title" content="Shansofts | Custom Software, Web & Mobile App Development" />
    <meta
      property="og:description"
      content="We build custom software, websites, and mobile apps that help businesses grow. Explore our IT solutions."
    />
    <meta property="og:image" content="https://www.shansofts.com/og-image.png" />
    <meta property="og:site_name" content="Shansofts" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shansofts | Custom Software, Web & Mobile App Development" />
    <meta
      name="twitter:description"
      content="We build custom software, websites, and mobile apps that help businesses grow. Explore our IT solutions."
    />
    <meta name="twitter:image" content="https://www.shansofts.com/og-image.png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Organization structured data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Shansofts",
        "url": "https://www.shansofts.com",
        "logo": "https://www.shansofts.com/favicon.svg",
        "description": "IT solutions company focused on custom software, web and mobile app development.",
        "email": "info@shansofts.com",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "info@shansofts.com",
          "contactType": "customer support"
        },
        "sameAs": [
          "https://www.linkedin.com/company/shansofts",
          "https://twitter.com/shansofts",
          "https://github.com/shansofts"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
